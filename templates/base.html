<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
    <title>{% block title %}我的小说推荐{% endblock %}</title>

    <!-- SEO -->
    <meta name="description" content="我的私人书单 - 记录和推荐读过的好书，包含小说评分、推荐语和阅读进度">
    <meta name="keywords" content="小说推荐,书单,阅读,番茄小说,好书推荐">
    <meta name="author" content="liang-yuan-yuan">
    <meta property="og:title" content="我的私人书单">
    <meta property="og:description" content="记录和推荐读过的好书">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">

    <!-- 百度统计（替换成你的ID） -->
    <script>
    var _hmt = _hmt || [];
    (function() {
        var hm = document.createElement("script");
        hm.src = "https://hm.baidu.com/hm.js?你的百度统计ID";
        var s = document.getElementsByTagName("script")[0];
        s.parentNode.insertBefore(hm, s);
    })();
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        /* 回到顶部按钮 */
        #backToTop {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #0d6efd;
            color: white;
            border: none;
            font-size: 1.2rem;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.4);
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        #backToTop:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(13, 110, 253, 0.5);
        }
        #backToTop.show {
            opacity: 1;
            visibility: visible;
        }
        #backToTop:active {
            transform: scale(0.9);
        }

        /* 加载动画 */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #666;
            transition: opacity 0.3s ease;
        }
        #loading.hide {
            opacity: 0;
            pointer-events: none;
        }
        #loading .spinner-border {
            width: 3rem;
            height: 3rem;
        }

        /* 页面切换淡入动画 */
        main {
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

    <!-- ===== 加载动画 ===== -->
    <div id="loading">
        <div class="text-center">
            <div class="spinner-border text-primary mb-3" role="status"></div>
            <div>加载中...</div>
        </div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-book"></i> 我的私人书单
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <span class="navbar-text text-light-emphasis d-none d-lg-inline">
                只推荐真正好看的小说
            </span>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="d-flex flex-wrap align-items-center ms-auto gap-1 mt-2 mt-lg-0">
                    <a href="{{ url_for('random_book') }}" class="btn btn-outline-warning btn-sm">
                        <i class="bi bi-shuffle"></i> 随机逛一逛
                    </a>
                    <a href="{{ url_for('export_data') }}" class="btn btn-outline-success btn-sm">
                        <i class="bi bi-download"></i> 导出
                    </a>
                    <a href="{{ url_for('import_data') }}" class="btn btn-outline-info btn-sm">
                        <i class="bi bi-upload"></i> 导入
                    </a>
                    <a href="{{ url_for('index') }}" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-house"></i> 首页
                    </a>
                    <form class="d-flex" action="{{ url_for('search') }}" method="get">
                        <input class="form-control form-control-sm" type="search"
                               name="q" placeholder="搜番茄小说..." aria-label="Search">
                        <button class="btn btn-outline-light btn-sm" type="submit">
                            <i class="bi bi-search"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主体内容 -->
    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- 页脚 -->
    <footer class="bg-light text-center text-muted py-3 mt-5">
        <div class="container">
            <div class="d-flex flex-wrap justify-content-center align-items-center gap-3">
                <small>📚 读书是性价比最高的自我投资 · 持续更新中</small>
                <span id="service-status">
                    <span class="badge bg-secondary">检测中...</span>
                </span>
            </div>
        </div>
    </footer>

    <!-- 回到顶部按钮 -->
    <button id="backToTop" title="回到顶部">
        <i class="bi bi-chevron-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ===== 隐藏加载动画 =====
        document.addEventListener('DOMContentLoaded', function() {
            const loading = document.getElementById('loading');
            loading.classList.add('hide');
            setTimeout(function() {
                loading.style.display = 'none';
            }, 300);
        });

        // ===== 回到顶部 =====
        const backToTopBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 300) {
                backToTopBtn.classList.add('show');
            } else {
                backToTopBtn.classList.remove('show');
            }
        });
        backToTopBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ===== 搜索框自动聚焦 =====
        const searchInput = document.querySelector('input[name="q"]');
        if (searchInput && !searchInput.value) {
            searchInput.focus();
        }

        // ===== 键盘快捷键 =====
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                let input = document.querySelector('input[name="q"]');
                if (input) {
                    input.focus();
                    if (window.innerWidth < 992) {
                        const toggler = document.querySelector('.navbar-toggler');
                        if (toggler && toggler.getAttribute('aria-expanded') === 'false') {
                            toggler.click();
                        }
                    }
                }
            }
            if (e.key === 'Escape') {
                const focused = document.querySelector('input[name="q"]:focus');
                if (focused) {
                    focused.value = '';
                    focused.blur();
                }
            }
        });

        // ===== 检测番茄服务 =====
        function checkTomatoService() {
            const statusEl = document.getElementById('service-status');
            fetch('http://127.0.0.1:18423/', {
                method: 'GET',
                mode: 'no-cors',
                signal: AbortSignal.timeout(3000)
            })
            .then(() => {
                statusEl.innerHTML = '<span class="badge bg-success">✅ 番茄服务已连接</span>';
            })
            .catch(() => {
                statusEl.innerHTML = '<span class="badge bg-danger">❌ 番茄服务未连接（搜索功能不可用）</span>';
            });
        }
        checkTomatoService();
        setInterval(checkTomatoService, 30000);
    </script>
</body>
</html>
