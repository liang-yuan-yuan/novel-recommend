<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
    <title>{% block title %}我的小说推荐{% endblock %}</title>

    <!-- SEO -->
    <meta name="description" content="我的私人书单 - 记录和推荐读过的好书，包含小说评分、推荐语和阅读进度">
    <meta name="keywords" content="小说推荐,书单,阅读,番茄小说,好书推荐">
    <meta name="author" content="liang-yuan-yuan">
    <meta property="og:title" content="我的私人书单">
    <meta property="og:description" content="记录和推荐读过的好书">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">

    <!-- 图片缓存策略 -->
    <meta http-equiv="Cache-Control" content="max-age=604800, public">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    <!-- Chart.js 图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        /* 回到顶部按钮 */
        #backToTop {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #0d6efd;
            color: white;
            border: none;
            font-size: 1.2rem;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.4);
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        #backToTop:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(13, 110, 253, 0.5);
        }
        #backToTop.show {
            opacity: 1;
            visibility: visible;
        }
        #backToTop:active {
            transform: scale(0.9);
        }

        /* 加载动画 */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #666;
            transition: opacity 0.3s ease;
        }
        #loading.hide {
            opacity: 0;
            pointer-events: none;
        }
        #loading .spinner-border {
            width: 3rem;
            height: 3rem;
        }

        /* 页面切换淡入动画 */
        main {
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 深色主题适配 ===== */
        [data-bs-theme="dark"] {
            color-scheme: dark;
        }
        [data-bs-theme="dark"] body {
            background-color: #1a1a2e;
            color: #e0e0e0;
        }
        [data-bs-theme="dark"] .card {
            background-color: #2a2a3e;
            border-color: #3a3a5e;
        }
        [data-bs-theme="dark"] .card-header {
            background-color: #1a1a2e;
        }
        [data-bs-theme="dark"] .bg-light {
            background-color: #2a2a3e !important;
        }
        [data-bs-theme="dark"] .text-muted {
            color: #a0a0b0 !important;
        }
        [data-bs-theme="dark"] .navbar {
            background-color: #0d0d1a !important;
        }
        [data-bs-theme="dark"] #loading {
            background: #1a1a2e;
        }
        [data-bs-theme="dark"] .alert-info {
            background-color: #2a3a4e;
            border-color: #3a4a5e;
            color: #c0d0e0;
        }
        [data-bs-theme="dark"] .hover-card:hover {
            box-shadow: 0 16px 40px rgba(0,0,0,0.4) !important;
        }
        [data-bs-theme="dark"] .btn-outline-secondary {
            color: #a0a0b0;
            border-color: #4a4a5e;
        }
        [data-bs-theme="dark"] .btn-outline-secondary:hover {
            background-color: #3a3a5e;
        }
        [data-bs-theme="dark"] .border-warning {
            border-color: #f0c040 !important;
        }
        [data-bs-theme="dark"] .text-dark {
            color: #e0e0e0 !important;
        }
        [data-bs-theme="dark"] .card.border-warning {
            background: linear-gradient(135deg, #2a2a1e 0%, #3a3a1e 100%) !important;
        }
        [data-bs-theme="dark"] #bgPanel {
            background: rgba(30,30,50,0.95) !important;
            border: 1px solid #3a3a5e;
        }
        [data-bs-theme="dark"] .bg-container {
            background-color: #1a1a2e;
        }

        /* ===== 自定义背景容器 ===== */
        .bg-container {
            min-height: 100vh;
            padding: 0;
            transition: background 0.3s ease;
        }

        .bg-default .bg-container {
            background: #f8f9fa;
        }
        .bg-dark-mode .bg-container {
            background: #1a1a2e;
        }
        .bg-gradient .bg-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .bg-ocean .bg-container {
            background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
        }
        .bg-forest .bg-container {
            background: linear-gradient(135deg, #134e5e 0%, #71b280 100%);
        }
        .bg-sunset .bg-container {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .bg-midnight .bg-container {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        }
        .bg-custom .bg-container {
            background-size: cover !important;
            background-position: center !important;
            background-attachment: fixed !important;
        }

        /* 页脚背景透明 */
        .bg-default footer,
        .bg-dark-mode footer,
        .bg-gradient footer,
        .bg-ocean footer,
        .bg-forest footer,
        .bg-sunset footer,
        .bg-midnight footer,
        .bg-custom footer {
            background: rgba(255, 255, 255, 0.8) !important;
        }

        [data-bs-theme="dark"] .bg-default footer,
        [data-bs-theme="dark"] .bg-dark-mode footer,
        [data-bs-theme="dark"] .bg-gradient footer,
        [data-bs-theme="dark"] .bg-ocean footer,
        [data-bs-theme="dark"] .bg-forest footer,
        [data-bs-theme="dark"] .bg-sunset footer,
        [data-bs-theme="dark"] .bg-midnight footer,
        [data-bs-theme="dark"] .bg-custom footer {
            background: rgba(20, 20, 40, 0.8) !important;
        }

        /* ===== 背景选择面板 ===== */
        #bgPanel {
            position: fixed;
            bottom: 80px;
            right: 30px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            display: none;
            min-width: 200px;
        }
        #bgPanel.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .bg-option {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .bg-option:hover {
            transform: scale(1.1);
        }
        .bg-option.active {
            border-color: #0d6efd;
        }
        .bg-option.bg-default-opt {
            background: #f8f9fa;
            border-color: #ddd;
        }
        .bg-option.bg-dark-mode-opt {
            background: #1a1a2e;
            border-color: #444;
        }
        .bg-option.bg-gradient-opt {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .bg-option.bg-ocean-opt {
            background: linear-gradient(135deg, #2b5876, #4e4376);
        }
        .bg-option.bg-forest-opt {
            background: linear-gradient(135deg, #134e5e, #71b280);
        }
        .bg-option.bg-sunset-opt {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }
        .bg-option.bg-midnight-opt {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        /* ===== 列表视图 ===== */
        .view-list .col {
            flex: 0 0 100% !important;
            max-width: 100% !important;
        }
        .view-list .card {
            flex-direction: row !important;
        }
        .view-list .card-img-top {
            aspect-ratio: 1/1.2 !important;
            max-width: 120px !important;
            border-radius: 8px 0 0 8px !important;
        }
        .view-list .card-body {
            flex: 1 !important;
        }
        .view-list .hover-card:hover .card-img-top {
            transform: none !important;
        }

        /* Toast 提示样式 */
        #liveToast {
            min-width: 200px;
            max-width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        #liveToast .toast-body {
            padding: 12px 16px;
            font-size: 0.9rem;
        }
        .toast-success {
            background-color: #198754;
            color: white;
        }
        .toast-danger {
            background-color: #dc3545;
            color: white;
        }
        .toast-warning {
            background-color: #ffc107;
            color: #212529;
        }
        .toast-info {
            background-color: #0dcaf0;
            color: #212529;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

    <!-- ===== 加载进度条 ===== -->
    <div id="progressBar" style="position: fixed; top: 0; left: 0; width: 100%; height: 3px; z-index: 10000; background: transparent; transition: opacity 0.3s ease; opacity: 0;">
        <div id="progressFill" style="height: 100%; width: 0%; background: linear-gradient(90deg, #0d6efd, #0dcaf0); transition: width 0.3s ease;"></div>
    </div>

    <!-- ===== 加载动画 ===== -->
    <div id="loading">
        <div class="text-center">
            <div class="spinner-border text-primary mb-3" role="status"></div>
            <div>加载中...</div>
        </div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-book"></i> 我的私人书单
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <span class="navbar-text text-light-emphasis d-none d-lg-inline">
                只推荐真正好看的小说
            </span>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="d-flex flex-wrap align-items-center ms-auto gap-1 mt-2 mt-lg-0">
                    <button id="themeToggle" class="btn btn-outline-light btn-sm" onclick="toggleTheme()" title="切换主题">
                        <i class="bi bi-moon"></i>
                    </button>
                    <button id="bgToggle" class="btn btn-outline-light btn-sm" onclick="toggleBg()" title="切换背景">
                        <i class="bi bi-image"></i>
                    </button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-info btn-sm">
                        <i class="bi bi-graph-up"></i> 仪表盘
                    </a>
                    <a href="{{ url_for('random_book') }}" class="btn btn-outline-warning btn-sm">
                        <i class="bi bi-shuffle"></i> 随机逛一逛
                    </a>
                    <a href="{{ url_for('export_data') }}" class="btn btn-outline-success btn-sm">
                        <i class="bi bi-download"></i> 导出
                    </a>
                    <a href="{{ url_for('import_data') }}" class="btn btn-outline-info btn-sm">
                        <i class="bi bi-upload"></i> 导入
                    </a>
                    <a href="{{ url_for('index') }}" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-house"></i> 首页
                    </a>
                    <form class="d-flex" action="{{ url_for('search') }}" method="get">
                        <input class="form-control form-control-sm" type="search" name="q"
                               placeholder="搜番茄小说..." aria-label="Search">
                        <button class="btn btn-outline-light btn-sm" type="submit">
                            <i class="bi bi-search"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <!-- 背景选择面板 -->
    <div id="bgPanel">
        <div class="d-flex flex-wrap gap-2 justify-content-center">
            <div class="bg-option bg-default-opt" onclick="setBg('default')" title="默认"></div>
            <div class="bg-option bg-dark-mode-opt" onclick="setBg('dark-mode')" title="深色"></div>
            <div class="bg-option bg-gradient-opt" onclick="setBg('gradient')" title="渐变"></div>
            <div class="bg-option bg-ocean-opt" onclick="setBg('ocean')" title="海洋"></div>
            <div class="bg-option bg-forest-opt" onclick="setBg('forest')" title="森林"></div>
            <div class="bg-option bg-sunset-opt" onclick="setBg('sunset')" title="日落"></div>
            <div class="bg-option bg-midnight-opt" onclick="setBg('midnight')" title="午夜"></div>
        </div>
        <div class="mt-2 text-center">
            <input type="file" id="bgUpload" accept="image/*" style="display:none;" onchange="uploadBg(event)">
            <button class="btn btn-sm btn-outline-primary" onclick="document.getElementById('bgUpload').click()">
                <i class="bi bi-upload"></i> 上传
            </button>
            <button class="btn btn-sm btn-outline-danger" onclick="resetBg()">
                <i class="bi bi-x"></i>
            </button>
        </div>
    </div>

    <!-- 背景容器 -->
    <div class="bg-container">
        <!-- 主体内容 -->
        <main class="container py-4">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- 页脚 -->
    <footer class="bg-light text-center text-muted py-3 mt-5">
        <div class="container">
            <div class="d-flex flex-wrap justify-content-center align-items-center gap-3">
                <small>📚 读书是性价比最高的自我投资 · 持续更新中</small>
                <span id="service-status">
                    <span class="badge bg-secondary">检测中...</span>
                </span>
            </div>
        </div>
    </footer>

    <!-- 回到顶部按钮 -->
    <button id="backToTop" title="回到顶部">
        <i class="bi bi-chevron-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ===== 加载进度条 =====
        let progressValue = 0;
        let progressInterval = null;

        function startProgress() {
            const bar = document.getElementById('progressBar');
            const fill = document.getElementById('progressFill');
            bar.style.opacity = '1';
            progressValue = 0;
            fill.style.width = '0%';
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                progressValue += Math.random() * 15 + 5;
                if (progressValue > 90) progressValue = 90;
                fill.style.width = progressValue + '%';
            }, 200);
        }

        function completeProgress() {
            const fill = document.getElementById('progressFill');
            const bar = document.getElementById('progressBar');
            clearInterval(progressInterval);
            fill.style.width = '100%';
            setTimeout(() => {
                bar.style.opacity = '0';
                fill.style.width = '0%';
            }, 400);
        }

        // ===== 深色/浅色主题切换 =====
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('themeToggle');
            if (html.getAttribute('data-bs-theme') === 'dark') {
                html.removeAttribute('data-bs-theme');
                btn.innerHTML = '<i class="bi bi-moon"></i>';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-bs-theme', 'dark');
                btn.innerHTML = '<i class="bi bi-sun"></i>';
                localStorage.setItem('theme', 'dark');
            }
        }

        // ===== 书架视图切换 =====
        function setView(view) {
            const container = document.getElementById('book-list');
            const gridBtn = document.getElementById('gridView');
            const listBtn = document.getElementById('listView');

            if (!container) return;

            container.parentElement.classList.remove('view-list');

            if (view === 'list') {
                container.parentElement.classList.add('view-list');
                if (gridBtn) gridBtn.className = 'btn btn-outline-primary';
                if (listBtn) listBtn.className = 'btn btn-primary';
            } else {
                if (gridBtn) gridBtn.className = 'btn btn-primary';
                if (listBtn) listBtn.className = 'btn btn-outline-primary';
            }
            localStorage.setItem('viewMode', view);
        }

        // ===== 自定义背景 =====
        function toggleBg() {
            const panel = document.getElementById('bgPanel');
            panel.classList.toggle('show');
        }

        function setBg(type) {
            const container = document.querySelector('.bg-container');
            container.className = 'bg-container';
            document.body.className = document.body.className.split(' ').filter(c => !c.startsWith('bg-')).join(
            ' ');

            if (type === 'default') {
                document.body.classList.add('bg-default');
            } else if (type === 'dark-mode') {
                document.body.classList.add('bg-dark-mode');
            } else if (type === 'gradient' || type === 'ocean' || type === 'forest' || type === 'sunset' || type ===
                'midnight') {
                document.body.classList.add('bg-' + type);
            }

            localStorage.setItem('bgType', type);
            updateBgOptions(type);
            document.getElementById('bgPanel').classList.remove('show');
        }

        function uploadBg(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const container = document.querySelector('.bg-container');
                container.className = 'bg-container';
                document.body.className = document.body.className.split(' ').filter(c => !c.startsWith('bg-')).join(
                    ' ');
                document.body.classList.add('bg-custom');
                container.style.backgroundImage = 'url(' + event.target.result + ')';
                localStorage.setItem('bgType', 'custom');
                localStorage.setItem('bgImage', event.target.result);
                updateBgOptions('custom');
                document.getElementById('bgPanel').classList.remove('show');
            };
            reader.readAsDataURL(file);
        }

        function resetBg() {
            const container = document.querySelector('.bg-container');
            container.className = 'bg-container';
            container.style.backgroundImage = '';
            document.body.className = document.body.className.split(' ').filter(c => !c.startsWith('bg-')).join(
            ' ');
            localStorage.removeItem('bgType');
            localStorage.removeItem('bgImage');
            updateBgOptions('default');
            document.getElementById('bgPanel').classList.remove('show');
        }

        function updateBgOptions(active) {
            document.querySelectorAll('.bg-option').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.bg-option.bg-' + active + '-opt').forEach(el => {
                el.classList.add('active');
            });
            if (active === 'custom') {
                document.querySelectorAll('.bg-option.bg-default-opt').forEach(el => {
                    el.classList.add('active');
                });
            }
        }

        // ===== 隐藏加载动画 =====
        document.addEventListener('DOMContentLoaded', function() {
            const loading = document.getElementById('loading');
            loading.classList.add('hide');
            setTimeout(function() {
                loading.style.display = 'none';
            }, 300);

            // 恢复主题
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-bs-theme', 'dark');
                document.getElementById('themeToggle').innerHTML = '<i class="bi bi-sun"></i>';
            }

            // 恢复背景
            const bgType = localStorage.getItem('bgType');
            if (bgType === 'custom') {
                const bgImage = localStorage.getItem('bgImage');
                if (bgImage) {
                    const container = document.querySelector('.bg-container');
                    document.body.classList.add('bg-custom');
                    container.style.backgroundImage = 'url(' + bgImage + ')';
                    updateBgOptions('custom');
                }
            } else if (bgType && bgType !== 'default') {
                document.body.classList.add('bg-' + bgType);
                updateBgOptions(bgType);
            } else {
                document.body.classList.add('bg-default');
                updateBgOptions('default');
            }

            // 恢复视图
            const viewMode = localStorage.getItem('viewMode');
            if (viewMode) {
                setView(viewMode);
            }

            // 完成进度条
            completeProgress();
        });

        // ===== 回到顶部 =====
        const backToTopBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 300) {
                backToTopBtn.classList.add('show');
            } else {
                backToTopBtn.classList.remove('show');
            }
        });
        backToTopBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ===== 搜索框自动聚焦 =====
        const searchInput = document.querySelector('input[name="q"]');
        if (searchInput && !searchInput.value) {
            searchInput.focus();
        }

        // ===== 键盘快捷键 =====
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                let input = document.querySelector('input[name="q"]');
                if (input) {
                    input.focus();
                    if (window.innerWidth < 992) {
                        const toggler = document.querySelector('.navbar-toggler');
                        if (toggler && toggler.getAttribute('aria-expanded') === 'false') {
                            toggler.click();
                        }
                    }
                }
            }
            if (e.key === 'Escape') {
                const focused = document.querySelector('input[name="q"]:focus');
                if (focused) {
                    focused.value = '';
                    focused.blur();
                }
            }
        });

        // ===== 点击链接启动进度条 =====
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a');
            if (link && link.href && !link.href.startsWith('javascript:') && !link.target) {
                const currentHost = window.location.host;
                if (link.href.includes(currentHost) || link.href.startsWith('/')) {
                    startProgress();
                }
            }
        });

        // ===== 页面加载完成结束进度条 =====
        window.addEventListener('load', function() {
            completeProgress();
        });

        // ===== 检测番茄服务 =====
        function checkTomatoService() {
            const statusEl = document.getElementById('service-status');
            fetch('http://127.0.0.1:18423/', {
                    method: 'GET',
                    mode: 'no-cors',
                    signal: AbortSignal.timeout(3000)
                })
                .then(() => {
                    statusEl.innerHTML = '<span class="badge bg-success">✅ 番茄服务已连接</span>';
                })
                .catch(() => {
                    statusEl.innerHTML = '<span class="badge bg-danger">❌ 番茄服务未连接（搜索功能不可用）</span>';
                });
        }
        checkTomatoService();
        setInterval(checkTomatoService, 30000);

        // ===== Toast 提示 =====
        function showToast(message, type = 'info') {
            const toastEl = document.getElementById('liveToast');
            const toastBody = document.getElementById('toastMessage');

            toastBody.textContent = message;
            toastEl.className = 'toast align-items-center border-0';
            toastEl.classList.add('toast-' + type);

            const toast = new bootstrap.Toast(toastEl, {
                delay: 3000,
                animation: true
            });
            toast.show();
        }
    </script>

    <!-- Toast 容器 -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1060;">
        <div id="liveToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage">
                    消息内容
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>
</body>
</html>
